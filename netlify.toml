[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish = "_site"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  included_files = ["*.py", "templates/**", "static/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app"
  status = 200
